# ============================================================
# deploy-pages.yml
# IonWave Bootstrap — GitHub Pages deployment with submodule checkout
#
# WHAT IT DOES:
#   Deploys the full site to GitHub Pages, including all submodule
#   content (ionwave/, execution/, tup-system/). Runs on every
#   push to main.
#
# WHY THIS EXISTS:
#   GitHub Pages "deploy from branch" mode does NOT checkout
#   submodules. This Actions workflow uses actions/checkout with
#   submodules: recursive so ionwave/data/ and ionwave/dashboard/
#   are served correctly.
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
