# ============================================================
# check_uncommitted.yml
# IonWave — Daily stale-commit alert via GitHub Actions
#
# WHAT IT DOES:
#   Runs every morning at 9am UTC. Checks the last commit date.
#   If it's been more than 3 days since the last push, creates
#   a GitHub Issue flagging that local work may not be committed.
#
# NOTE: This workflow runs on the REMOTE repo, so it only catches
#       pushes that didn't happen — it can't see local-only changes.
#       Pair with scripts/check_uncommitted.sh at session start/end
#       for full coverage.
# ============================================================

name: Stale Commit Alert

on:
  schedule:
    # 9am UTC daily (Mon–Fri)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-stale:
    name: Check for stale commits
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Check last commit age
        id: commit-age
        run: |
          LAST_COMMIT_EPOCH=$(git log -1 --format="%ct")
          NOW_EPOCH=$(date +%s)
          AGE_SECONDS=$(( NOW_EPOCH - LAST_COMMIT_EPOCH ))
          AGE_DAYS=$(( AGE_SECONDS / 86400 ))
          LAST_COMMIT_DATE=$(git log -1 --format="%ci")
          LAST_COMMIT_MSG=$(git log -1 --format="%s")
          BRANCH=$(git rev-parse --abbrev-ref HEAD)

          echo "age_days=$AGE_DAYS" >> $GITHUB_OUTPUT
          echo "last_commit_date=$LAST_COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "last_commit_msg=$LAST_COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          echo "Last commit: $LAST_COMMIT_DATE ($AGE_DAYS days ago)"
          echo "Message: $LAST_COMMIT_MSG"

      - name: Create stale-commit issue (if overdue)
        if: ${{ fromJson(steps.commit-age.outputs.age_days) >= 3 }}
        uses: actions/github-script@v7
        with:
          script: |
            const ageDays = ${{ steps.commit-age.outputs.age_days }};
            const lastDate = '${{ steps.commit-age.outputs.last_commit_date }}';
            const lastMsg = '${{ steps.commit-age.outputs.last_commit_msg }}';
            const branch = '${{ steps.commit-age.outputs.branch }}';

            // Check if there's already an open stale-commit issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stale-commit'
            });

            if (issues.data.length > 0) {
              console.log(`Stale-commit issue already open (#${issues.data[0].number}), skipping.`);
              return;
            }

            // Create a new issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ No commit in ${ageDays} days — local work may be uncommitted`,
              labels: ['stale-commit'],
              body: `## Stale Commit Alert

**Last push to \`${branch}\`:** ${lastDate}
**Last commit message:** ${lastMsg}
**Days since last push:** ${ageDays}

### What this means
It's been ${ageDays} days since any code was pushed to this repo.
If you've been working in Claude Code sessions, that work may be sitting uncommitted locally.

### Action required
At the end of every Claude session, run the commit guard:
\`\`\`bash
bash execution/scripts/check_uncommitted.sh
\`\`\`

If there are uncommitted files, commit within the relevant submodule first, then update the parent:
\`\`\`bash
# Example: commit data changes in ionwave submodule
cd ionwave && git add data/ IonWave/ && git commit -m "..." && git push && cd ..
git add ionwave execution SESSION_LOG.md ACTIVE_WORK.md
git commit -m "Session N: <brief description of what was done>"
git push origin main
\`\`\`

### Close this issue
Close this issue once you've verified the local repo is committed and pushed.

---
*Auto-generated by the Stale Commit Alert workflow. See \`.github/workflows/check_uncommitted.yml\`.*`
            });

            console.log(`Created stale-commit issue for ${ageDays}-day gap.`);

      - name: Report clean status
        if: ${{ fromJson(steps.commit-age.outputs.age_days) < 3 }}
        run: |
          echo "✅ Repo is fresh — last commit was ${{ steps.commit-age.outputs.age_days }} day(s) ago. No alert needed."
